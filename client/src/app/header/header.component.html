<div class="header-panel" *ngIf="editorMode">
    <button mat-button title="{{'header.edit-project' | translate}}" class="main-btn" (click)="onSetup()">
        <mat-icon aria-label="Edit Views">settings</mat-icon>
    </button>

</div>

<div class="header-right" *ngIf="editorMode">
    <button mat-button title="{{'header.save-project' | translate}}" [matMenuTriggerFor]="prjview"
        #prjviewtrigger="matMenuTrigger" class="main-btn save-btn">
        儲存
    </button>
    <mat-menu #prjview="matMenu" class="leftbar-item-menu header-menu" yPosition="below" [overlapTrigger]="false">
        <button mat-menu-item (click)="onNewProject()">{{'header.new-project' | translate}}</button>
        <mat-divider class="menu-separator"></mat-divider>
        <button mat-menu-item (click)="onSaveProject()">{{'header.save-project' | translate}}</button>
        <button mat-menu-item (click)="onSaveProjectAs()">{{'header.saveas-project' | translate}}</button>
        <mat-divider class="menu-separator"></mat-divider>
        <button mat-menu-item (click)="onOpenProject();$event.stopPropagation()">{{'header.open-project' |
            translate}}</button>
        <mat-divider class="menu-separator"></mat-divider>
        <button mat-menu-item (click)="onRenameProject()">{{'header.rename-project' | translate}}</button>
        <input type="file" #fileImportInput style="display: none" id="projectFileUpload"
            (change)="onFileChangeListener($event)" accept=".json" />
    </mat-menu>
</div>
<app-tutorial #tutorial></app-tutorial>
