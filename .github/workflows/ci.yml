name: CI

on:
  push:
    branches: ['develop']
  pull_request:
    branches: ['develop']

concurrency:
  group: fuxa-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  fuxa-ci:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: 伺服器建置與測試（Docker Node 18）
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work/server \
            node:18-bullseye \
            bash -lc "npm ci --no-audit --no-fund && npm run build && npm test"
      - name: 前端檢查與建置（Docker Node 18）
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work/client \
            node:18-bullseye \
            bash -lc "npm ci --no-audit --no-fund && npm run lint && npm run build"
