name: CI

on:
  push:
    branches: ['develop']
  pull_request:
    branches: ['develop']

concurrency:
  group: fuxa-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  fuxa-ci:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 伺服器建置與測試
        working-directory: ${{ github.workspace }}/server
        run: npm ci --no-audit --no-fund && npm run build && npm test

      - name: 前端 Lint 檢查與建置
        working-directory: ${{ github.workspace }}/client
        run: npm ci --no-audit --no-fund && npm run lint && npm run build
