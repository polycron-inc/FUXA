name: Deploy FUXA

on:
  push:
    branches: ['main', 'develop']
  workflow_dispatch:

concurrency:
  group: fuxa-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: 清理工作目錄（修復 root 權限殘留）
        run: |
          if [ -d "$GITHUB_WORKSPACE" ]; then
            sudo rm -rf "$GITHUB_WORKSPACE"/*  "$GITHUB_WORKSPACE"/.[!.]* 2>/dev/null || true
          fi

      - uses: actions/checkout@v4

      - name: 設定 Docker 環境
        run: |
          if [ -S "$HOME/.colima/default/docker.sock" ]; then
            echo "DOCKER_HOST=unix://$HOME/.colima/default/docker.sock" >> $GITHUB_ENV
          elif [ -S "$HOME/.colima/docker.sock" ]; then
            echo "DOCKER_HOST=unix://$HOME/.colima/docker.sock" >> $GITHUB_ENV
          fi
          docker info

      - name: 建置 FUXA 映像
        run: |
          DOCKER_BUILDKIT=1 docker build -t fms/fuxa:latest "$GITHUB_WORKSPACE"

      - name: 重啟 FUXA 服務
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          COMPOSE_DIR=""

          for candidate in \
            "/www/fms" \
            "/opt/fms" \
            "$GITHUB_WORKSPACE/.." \
            "$GITHUB_WORKSPACE"; do
            if [ -f "$candidate/compose.yml" ] || [ -f "$candidate/compose.yaml" ]; then
              COMPOSE_DIR="$candidate"
              break
            fi
          done

          if [ -z "$COMPOSE_DIR" ]; then
            echo "❌ 找不到 compose.yml/compose.yaml，請確認部署目錄"
            echo "目前目錄內容："
            ls -la "$GITHUB_WORKSPACE" || true
            exit 1
          fi

          echo "✅ 使用部署目錄: $COMPOSE_DIR"
          cd "$COMPOSE_DIR"

          # 移除舊容器（可能由不同 compose 專案建立）
          if docker inspect fuxa >/dev/null 2>&1; then
            echo "⚠️ 發現舊的 fuxa 容器，正在移除..."
            docker stop fuxa 2>/dev/null || true
            docker rm fuxa 2>/dev/null || true
          fi

          if docker compose version >/dev/null 2>&1; then
            docker compose up -d --force-recreate fuxa
          elif command -v docker-compose >/dev/null 2>&1; then
            docker-compose up -d --force-recreate fuxa
          else
            echo "❌ 找不到 docker compose 或 docker-compose"
            exit 1
          fi

      - name: 健康檢查
        run: |
          echo "--- 容器狀態 ---"
          docker ps -a --filter name=fuxa --format "table {{.ID}}\t{{.Status}}\t{{.Ports}}" || true

          for i in {1..30}; do
            # 在容器內部檢查，繞過主機網路問題
            if docker exec fuxa node -e "
              const http = require('http');
              http.get('http://127.0.0.1:1881/api/settings', (r) => {
                process.exit(r.statusCode === 200 ? 0 : 1);
              }).on('error', () => process.exit(1));
            " 2>/dev/null; then
              echo "✅ FUXA 啟動成功（容器內部健康檢查通過）"
              # 額外確認主機端口映射
              if curl -sf http://127.0.0.1:1881/api/settings >/dev/null 2>&1; then
                echo "✅ 主機端口映射正常 (127.0.0.1:1881)"
              else
                echo "⚠️ 主機端口映射不可達，但容器內服務正常運行"
              fi
              exit 0
            fi
            echo "等待 FUXA 啟動... ($i/30)"
            sleep 2
          done

          echo "❌ FUXA 啟動失敗"
          echo "--- 診斷資訊 ---"
          echo "容器狀態:"
          docker ps -a --filter name=fuxa || true
          echo "端口映射:"
          docker port fuxa || true
          echo "容器日誌:"
          docker logs fuxa --tail 200 || true
          exit 1
