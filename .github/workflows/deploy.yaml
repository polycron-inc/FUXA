name: Deploy FUXA

on:
  push:
    branches: ['main', 'develop']
  workflow_dispatch:

concurrency:
  group: fuxa-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, fms]
    steps:
      - uses: actions/checkout@v4

      - name: 設定 Docker 環境
        run: |
          if [ -S "$HOME/.colima/default/docker.sock" ]; then
            echo "DOCKER_HOST=unix://$HOME/.colima/default/docker.sock" >> $GITHUB_ENV
          elif [ -S "$HOME/.colima/docker.sock" ]; then
            echo "DOCKER_HOST=unix://$HOME/.colima/docker.sock" >> $GITHUB_ENV
          fi
          docker info

      - name: 建置 FUXA 映像
        run: |
          DOCKER_BUILDKIT=1 docker build -t fms/fuxa:latest "$GITHUB_WORKSPACE"

      - name: 重啟 FUXA 服務
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          COMPOSE_DIR=""

          for candidate in \
            "/www/fms" \
            "/opt/fms" \
            "/home/linuxuser/workspace/fms" \
            "$GITHUB_WORKSPACE/.." \
            "$GITHUB_WORKSPACE"; do
            if [ -f "$candidate/compose.yml" ] || [ -f "$candidate/compose.yaml" ]; then
              COMPOSE_DIR="$candidate"
              break
            fi
          done

          if [ -z "$COMPOSE_DIR" ]; then
            echo "❌ 找不到 compose.yml/compose.yaml，請確認部署目錄"
            echo "目前目錄內容："
            ls -la "$GITHUB_WORKSPACE" || true
            exit 1
          fi

          echo "✅ 使用部署目錄: $COMPOSE_DIR"
          cd "$COMPOSE_DIR"

          if docker compose version >/dev/null 2>&1; then
            docker compose up -d --force-recreate fuxa
          elif command -v docker-compose >/dev/null 2>&1; then
            docker-compose up -d --force-recreate fuxa
          else
            echo "❌ 找不到 docker compose 或 docker-compose"
            exit 1
          fi

      - name: 健康檢查
        run: |
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:1881/api/project >/dev/null; then
              echo "✅ FUXA 啟動成功"
              exit 0
            fi
            echo "等待 FUXA 啟動... ($i/30)"
            sleep 2
          done
          echo "❌ FUXA 啟動失敗"
          docker logs fuxa --tail 200 || true
          exit 1
